version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No host ports – internal only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  bank-webhook:
    image: anujbdev/vaultly-bank-webhook:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    depends_on:
      - redis

  mock-payment-gateway:
    image: anujbdev/vaultly-gateway:latest
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      WEBHOOK_URL: http://bank-webhook:3003/bankWebhook
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://vaultly.anujb.space}
    depends_on:
      redis:
        condition: service_healthy
      bank-webhook:
        condition: service_started

  user-app:
    image: anujbdev/vaultly-user-app:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://vaultly.anujb.space}
      NEXT_PUBLIC_GATEWAY_URL: http://mock-payment-gateway:3004
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      AI_USER_DAILY_CAP: ${AI_USER_DAILY_CAP:-5}
      AI_GLOBAL_DAILY_CAP: ${AI_GLOBAL_DAILY_CAP:-200}
      GATEWAY_ADMIN_TOKEN: ${GATEWAY_ADMIN_TOKEN}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      APP_URL: https://vaultly.anujb.space
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - user-app