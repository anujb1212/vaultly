name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: docker/Dockerfile.bank-webhook
            image: anujbdev/vaultly-bank-webhook
            build-args: ""
          - dockerfile: docker/Dockerfile.gateway
            image: anujbdev/vaultly-gateway
            build-args: ""
          - dockerfile: docker/Dockerfile.user
            image: anujbdev/vaultly-user-app
            build-args: DATABASE_URL=postgresql://postgres:prisma@127.0.0.1:5432/vaultly?schema=public

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: vaultly
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: prisma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vaultly"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (host driver)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.build-args }}
          network: host
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/vaultly
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f